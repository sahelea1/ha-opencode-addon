name: "ha-opencode-addon"
version: "1.9.0"
slug: "opencode"
description: "OpenCode web UI with config safety guardian for Home Assistant"
url: "https://github.com/sahelea1/ha-opencode-addon"

arch:
  - amd64
  - aarch64

startup: application
boot: auto

# We run Node directly as PID 1 — no s6-overlay
init: false

# Access to HA Supervisor API (for reload/restart)
hassio_api: true
homeassistant_api: true

# Ingress — embeds web UI in HA sidebar, auth handled by HA
ingress: true
ingress_port: 8099
panel_icon: "mdi:code-braces"

# Mount HA config directory read/write
map:
  - config:rw

# Direct port access (disabled by default, user can enable)
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "OpenCode Web UI (direct access)"

# Provider, API keys, and login are entered interactively in the OpenCode
# web UI; they persist in /data/oc-v2/{config,share} (symlinked into
# ~/.config/opencode and ~/.local/share/opencode) so they survive add-on
# restarts and rebuilds.
options:
  confirm_timeout_minutes: 10
schema:
  confirm_timeout_minutes: "int(1,60)?"
